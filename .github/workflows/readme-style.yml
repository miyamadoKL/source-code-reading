name: readme-style

# OSS ごとの目次 README.md の体裁(AGENTS.md §2)を検査する。
# 検査ロジックは .github/scripts/check-readme-style.py に置き、ローカルでも同じスクリプトで実行できる。

on:
  push:
    branches: [main]
    paths:
      - "*/README.md"
      - ".github/scripts/check-readme-style.py"
      - ".github/workflows/readme-style.yml"
  pull_request:
    paths:
      - "*/README.md"
      - ".github/scripts/check-readme-style.py"
      - ".github/workflows/readme-style.yml"

permissions:
  contents: read

jobs:
  readme-style:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check README TOC style
        run: python3 .github/scripts/check-readme-style.py

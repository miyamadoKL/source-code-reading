name: unwanted-files

# 執筆ガイドやローカル絶対パスなど、不要ファイルの混入を防ぐ。
# 検査ロジックは .github/scripts/check-unwanted-files.py に置き、ローカルでも同じスクリプトで実行できる。

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".gitignore"
      - ".github/scripts/check-unwanted-files.py"
      - ".github/workflows/unwanted-files.yml"
  pull_request:
    paths:
      - "**/*.md"
      - ".gitignore"
      - ".github/scripts/check-unwanted-files.py"
      - ".github/workflows/unwanted-files.yml"

permissions:
  contents: read

jobs:
  unwanted-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Check unwanted file commits
        run: python3 .github/scripts/check-unwanted-files.py

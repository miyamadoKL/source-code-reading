name: markdownlint

# Markdown ドキュメントの整形を検査する。
# ルールは .markdownlint-cli2.jsonc に定義し、ローカル(npx markdownlint-cli2)と共有する。

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".markdownlint-cli2.jsonc"
      - ".github/workflows/markdownlint.yml"
  pull_request:
    paths:
      - "**/*.md"
      - ".markdownlint-cli2.jsonc"
      - ".github/workflows/markdownlint.yml"

permissions:
  contents: read

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      # 検査対象(globs)とルールは .markdownlint-cli2.jsonc から読み込む。
      - name: Run markdownlint-cli2
        run: npx --yes markdownlint-cli2@0.22.1
